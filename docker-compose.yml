version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: db-differ-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "13306:3306"
    volumes:
      - ./testdata/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15
    container_name: db-differ-postgres
    environment:
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "15432:5432"
    volumes:
      - ./testdata/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
